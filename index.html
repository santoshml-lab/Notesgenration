<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Notes Pro 🚀</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

/* HEADER */
header{
text-align:center;
padding:20px;
font-size:26px;
font-weight:700;
color:#38bdf8;
}

/* CARD */
.card{
max-width:900px;
margin:20px auto;
background:#111827;
padding:20px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 0 30px rgba(56,189,248,0.15);
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#0b1220;
color:white;
outline:none;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
background:linear-gradient(45deg,#38bdf8,#6366f1);
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

/* OUTPUT */
.output{
margin-top:15px;
background:#0b1220;
padding:15px;
border-radius:12px;
line-height:1.8;
max-height:400px;
overflow:auto;
}

/* DOWNLOAD BTN */
.download{
background:linear-gradient(45deg,#22c55e,#16a34a);
}

</style>
</head>

<body>

<header>📚 AI Notes Pro</header>

<div class="card">

<h2>Generate Smart Notes 🚀</h2>

<input id="cls" placeholder="Class (1-10)">
<input id="subject" placeholder="Subject">
<input id="chapter" placeholder="Chapter">

<button onclick="getNotes()">Generate Notes</button>

<button class="download" onclick="downloadNotes()">
⬇ Download Notes
</button>

<div class="output" id="notesBox">
Your notes will appear here...
</div>

</div>

<script>

const API = "https://student-learning-system-r6bi.onrender.com";

let lastNotes = "";

/* GENERATE NOTES */
async function getNotes(){

notesBox.innerHTML = "⚡ Generating AI Notes...";

let res = await fetch(API+"/generate-notes",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
student_name:"student",
student_class:cls.value,
subject:subject.value,
chapter:chapter.value
})
});

let data = await res.json();

lastNotes = data.notes || "No notes found";

notesBox.innerHTML = marked.parse(lastNotes);

}

/* DOWNLOAD NOTES */
function downloadNotes(){

if(!lastNotes){
alert("No notes to download!");
return;
}

let blob = new Blob([lastNotes], {type:"text/plain"});
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "AI_Notes.txt";
a.click();

URL.revokeObjectURL(url);

}

</script>

</body>
</html>
